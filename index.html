<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investigación SST - Safe Game</title>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f7f9fc;
  text-align: center;
  color: #333;
}
h1 { margin-top: 20px; }

#container {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 30px;
}

#board {
  display: grid;
  grid-template-columns: repeat(5, 80px);
  gap: 10px;
  padding: 20px;
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.cell {
  width: 80px;
  height: 80px;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  transition: transform 0.2s;
}

.cell:hover {
  transform: scale(1.05);
}

/* 🎨 Colores pastel */
.normal { background: #e3f2fd; }        /* azul claro */
.investigacion { background: #ffe0b2; } /* naranja pastel */
.bonus { background: #c8e6c9; }         /* verde menta */
.riesgo { background: #ffcdd2; }        /* rojo suave */

.player {
  border: 3px solid #6c63ff;
}

#sidepanel {
  width: 260px;
  background: #ffffff;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

#log {
  height: 200px;
  overflow-y: auto;
  background: #f1f3f6;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  color: #555;
}

button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #6c63ff;
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #574fd6;
}
</style>
</head>

<body>

<h1>🎮 Safe Game - Investigación SST</h1>

<div id="container">
  <div id="board"></div>

  <div id="sidepanel">
    <p>🏆 Puntos: <span id="score">0</span></p>
    <p>🎯 Nivel: <span id="level">1</span></p>
    <p>📊 Progreso: <span id="progress">0/10</span></p>
    <div id="log"></div>
    <button id="rollBtn">🎲 Lanzar dado</button>
  </div>
</div>

<script>
/* 🔥 TODA TU LÓGICA ORIGINAL (SIN CAMBIOS) */
const boardSize = 50;
let playerPos = 0;
let score = 0;
let level = 1;

let questionsAnswered = 0;
let correctAnswers = 0;
const maxQuestions = 10;

const board = document.getElementById('board');
const cells = [];

for(let i=0;i<boardSize;i++){
  const cell = document.createElement('div');

  let r = Math.random();
  let type = r<0.2?'normal':r<0.5?'riesgo':r<0.8?'investigacion':'bonus';

  cell.classList.add('cell', type);
  cell.dataset.type = type;

  const emoji = {
    normal:'⚪', investigacion:'🎴', bonus:'⭐', riesgo:'⚠️'
  }[type];

  cell.textContent = emoji;

  board.appendChild(cell);
  cells.push(cell);
}

function drawPlayer(){
  cells.forEach(c=>c.classList.remove('player'));
  cells[playerPos].classList.add('player');
}
drawPlayer();

const accidents = [
  {desc:"Operario sin casco",correct:true},
  {desc:"Uso correcto de EPP",correct:false},
  {desc:"Aceite derramado",correct:true},
  {desc:"Área segura",correct:false},
  {desc:"Trabajador sin arnés",correct:true},
  {desc:"Supervisión constante",correct:false},
  {desc:"Cables sueltos",correct:true},
  {desc:"Zona señalizada",correct:false},
  {desc:"Extintor vencido",correct:true},
  {desc:"Área ventilada",correct:false}
].sort(()=>Math.random()-0.5);

let currentQuestion = 0;

function log(msg){
  document.getElementById('log').innerHTML = msg + "<br>" + document.getElementById('log').innerHTML;
}

document.getElementById('rollBtn').onclick = ()=>{
  const roll = Math.floor(Math.random()*6)+1;
  playerPos = (playerPos + roll) % boardSize;
  drawPlayer();
  checkCell();
};

function checkCell(){
  let type = cells[playerPos].dataset.type;

  if(type==='bonus'){
    score+=5;
    log("⭐ Bonus");
  }

  if(type==='investigacion' || (type==='riesgo' && Math.random()<0.8)){
    showQuestion();
  }

  updateUI();
}

function showQuestion(){

  if(questionsAnswered >= maxQuestions){
    endGame();
    return;
  }

  const q = accidents[currentQuestion];
  currentQuestion++;

  const modal = document.createElement("div");
  modal.style = "position:fixed;top:0;width:100%;height:100%;background:#0008;display:flex;align-items:center;justify-content:center;";

  modal.innerHTML = `
    <div style="background:white;color:black;padding:20px;border-radius:15px;text-align:center;">
      <h3>${q.desc}</h3>
      <p>¿Es un riesgo?</p>
      <button onclick="answer(true)">Verdadero</button>
      <button onclick="answer(false)">Falso</button>
    </div>
  `;

  document.body.appendChild(modal);

  window.answer = (ans)=>{
    document.body.removeChild(modal);

    questionsAnswered++;

    if(ans === q.correct){
      score+=10;
      correctAnswers++;
      log("✅ Correcto");
    } else {
      score-=5;
      log("❌ Incorrecto");
    }

    updateUI();

    if(questionsAnswered >= maxQuestions){
      endGame();
    }
  };
}

function updateUI(){
  document.getElementById('score').textContent = score;
  document.getElementById('progress').textContent = `${questionsAnswered}/${maxQuestions}`;
}

function endGame(){

  document.getElementById('rollBtn').disabled = true;

  let percent = Math.round((correctAnswers/maxQuestions)*100);

  const modal = document.createElement("div");
  modal.style = "position:fixed;top:0;width:100%;height:100%;background:#0008;display:flex;align-items:center;justify-content:center;";

  modal.innerHTML = `
    <div style="background:white;color:black;padding:25px;border-radius:15px;text-align:center;">
      <h2>🏁 Resultado</h2>
      <p>Puntaje: ${score}</p>
      <p>Aciertos: ${correctAnswers}/${maxQuestions}</p>
      <p>📊 Resultado: ${percent}%</p>
      <h3>${percent>=80?"🏆 Experto SST":percent>=50?"👍 Aceptable":"⚠️ Riesgo alto"}</h3>
      <button onclick="location.reload()">Reiniciar</button>
    </div>
  `;

  document.body.appendChild(modal);
}
</script>

</body>
</html>
